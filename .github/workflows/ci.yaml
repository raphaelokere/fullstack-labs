name: CI Pipeline

on:
  push:
    branches:
      - main
      - 'feature-*'
  pull_request:
    branches:
      - main

defaults:
  run:
    working-directory: codebase/rdicidr-0.1.0

env:
  REACT_APP_API_URL: https://api.rdicidr.com

jobs:
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '15'
      - run: npm ci
      - uses: actions/cache/save@v3
        with:
          path: codebase/rdicidr-0.1.0/node_modules
          key: node-modules-${{ hashFiles('codebase/rdicidr-0.1.0/package-lock.json') }}

  lint:
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '15'
      - uses: actions/cache/restore@v3
        with:
          path: codebase/rdicidr-0.1.0/node_modules
          key: node-modules-${{ hashFiles('codebase/rdicidr-0.1.0/package-lock.json') }}
      - run: npm run lint

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '15'
      - uses: actions/cache/restore@v3
        with:
          path: codebase/rdicidr-0.1.0/node_modules
          key: node-modules-${{ hashFiles('codebase/rdicidr-0.1.0/package-lock.json') }}
      - run: npm test -- --watchAll=false

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '15'
      - uses: actions/cache/restore@v3
        with:
          path: codebase/rdicidr-0.1.0/node_modules
          key: node-modules-${{ hashFiles('codebase/rdicidr-0.1.0/package-lock.json') }}
      - run: npm run build
