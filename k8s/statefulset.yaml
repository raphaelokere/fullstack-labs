apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: rdicidr
  namespace: production
  labels:
    app: rdicidr
spec:
  serviceName: rdicidr-service
  replicas: 3
  selector:
    matchLabels:
      app: rdicidr
  template:
    metadata:
      labels:
        app: rdicidr
    spec:
      containers:
        - name: rdicidr
          image: rdicidr:latest
          imagePullPolicy: IfNotPresent # local image built into minikube's docker daemon, no registry to pull from
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
